[labels]
app.name = Help

# Error messages used by a.error.label(...).
errors.not_logged_in = Not logged in
errors.invalid_kind = Invalid kind
errors.help_not_configured = Help is not configured for this server
errors.body_is_required = Please add a bit more detail before submitting
errors.body_too_long = Your message is too long
errors.title_is_required = Please give your post a title
errors.title_too_long = Your title is too long
errors.no_fingerprint_returned = The destination did not return a fingerprint
errors.unknown_document = Unknown document

# Post titles for "Introduce yourself" and "Ask a question". Resolved at post time;
# the user's name is interpolated via {name}. titles.someone is the fallback
# used when the user has no display name set.
titles.intro = Introducing {name}
titles.someone = Someone
